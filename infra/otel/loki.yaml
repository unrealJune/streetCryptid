# Loki single-binary, filesystem storage. Schema v13 + structured metadata are REQUIRED for the
# native OTLP ingestion path (/otlp) the collector uses.
auth_enabled: false

server:
  http_listen_port: 3100

common:
  instance_addr: 127.0.0.1
  path_prefix: /loki
  storage:
    filesystem:
      chunks_directory: /loki/chunks
      rules_directory: /loki/rules
  replication_factor: 1
  ring:
    kvstore:
      store: inmemory

schema_config:
  configs:
    - from: '2024-04-01'
      store: tsdb
      object_store: filesystem
      schema: v13
      index:
        prefix: index_
        period: 24h

limits_config:
  allow_structured_metadata: true
  retention_period: 48h

compactor:
  working_directory: /loki/compactor
  retention_enabled: true
  delete_request_store: filesystem
