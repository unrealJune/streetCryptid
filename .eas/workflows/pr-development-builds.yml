name: PR development builds

on:
  pull_request: {}

jobs:
  comment_started:
    name: Comment that builds started
    # Copilot owns agent PRs and records its initiating trusted user as an assignee.
    if: ${{contains('["Cobular","unrealJune"]',toJSON(github.event.pull_request.user.login))||contains(toJSON(github.event.pull_request.assignees),'"login":"Cobular"')||contains(toJSON(github.event.pull_request.assignees),'"login":"unrealJune"')}}
    type: github-comment
    params:
      payload: |
        🏗️ **EAS development builds started**

        iOS and Android are building independently with production configuration. Each install link will be posted as soon as that platform finishes.

  build_ios:
    name: Build iOS development client
    needs: [comment_started]
    type: build
    params:
      platform: ios
      profile: production-development-ios

  build_android:
    name: Build Android development client
    needs: [comment_started]
    type: build
    params:
      platform: android
      profile: production-development-android

  comment_ios_success:
    name: Comment with iOS install link
    after: [build_ios]
    if: ${{ after.build_ios.status == 'success' }}
    type: github-comment
    params:
      message: '✅ The iOS development build is ready to install.'
      build_ids:
        - ${{ after.build_ios.outputs.build_id }}
      update_group_ids: []
      deployment_ids: []

  comment_ios_failure:
    name: Comment on iOS build failure
    after: [build_ios]
    if: ${{ after.build_ios.status == 'failure' }}
    type: github-comment
    params:
      payload: |
        ❌ **The iOS development build failed**

        Check the EAS workflow logs for details.

  comment_android_success:
    name: Comment with Android install link
    after: [build_android]
    if: ${{ after.build_android.status == 'success' }}
    type: github-comment
    params:
      message: '✅ The Android development build is ready to install.'
      build_ids:
        - ${{ after.build_android.outputs.build_id }}
      update_group_ids: []
      deployment_ids: []

  comment_android_failure:
    name: Comment on Android build failure
    after: [build_android]
    if: ${{ after.build_android.status == 'failure' }}
    type: github-comment
    params:
      payload: |
        ❌ **The Android development build failed**

        Check the EAS workflow logs for details.
