name: iOS Release

# Build the iOS app on a GitHub-hosted macOS runner via `eas build --local`
# (EAS tooling, but the compile happens here, not in Expo's cloud queue), then
# submit to App Store Connect. Runs on every push to `main`.
#
# One-time setup required before this works — see .github/workflows/README-ios-release.md:
#   - GitHub secret EXPO_TOKEN (Expo robot access token)
#   - iOS signing credentials + ASC API key stored on EAS servers
#   - a seed tag matching the current app.json version: `git tag v1.0.0 && git push origin v1.0.0`

on:
  push:
    branches: [main]
    paths-ignore:
      - "docs/**"
      - "infra/**"
      - "**/*.md"

# Queue overlapping pushes instead of building/submitting the same store slot twice.
concurrency:
  group: ios-release
  cancel-in-progress: false

permissions:
  contents: write # push the version-bump commit + tag back to main

jobs:
  build-and-submit:
    # macos-15 ships Xcode 16 / iOS 18 SDK. Required: the iroh `netdev` crate references
    # `nw_path_is_ultra_constrained` (Network.framework, iOS 18 SDK), which the older
    # macos-14 iOS 17 SDK doesn't declare — the Rust link fails with an undefined symbol.
    runs-on: macos-15
    env:
      EXPO_TOKEN: ${{ secrets.EXPO_TOKEN }}
      CACHE_VERSION: v1 # bump to bust all caches without touching lockfiles
    steps:
      - name: Checkout (full history for semver)
        uses: actions/checkout@v4
        with:
          fetch-depth: 0
          token: ${{ secrets.GITHUB_TOKEN }}

      - name: Select latest stable Xcode (iOS 18+ SDK)
        uses: maxim-lobanov/setup-xcode@v1
        with:
          xcode-version: latest-stable

      - name: Compute next version (Conventional Commits)
        id: semver
        uses: paulhatch/semantic-version@v5.4.0
        with:
          tag_prefix: "v"
          # feat! / fix! / any type with ! or a BREAKING CHANGE footer => major
          major_pattern: '/^\w+(\(.+\))?!:|BREAKING[ -]CHANGE/'
          # feat: => minor; everything else (fix:, chore:, ...) => patch
          minor_pattern: '/^feat(\(.+\))?:/'
          version_format: "${major}.${minor}.${patch}"
          search_commit_body: true
          bump_each_commit: false

      - name: Set up Bun
        uses: oven-sh/setup-bun@v2 # caches the global bun store keyed on bun.lock

      - name: Cache node_modules
        uses: actions/cache@v4
        with:
          path: node_modules
          key: ${{ runner.os }}-${{ env.CACHE_VERSION }}-node-${{ hashFiles('bun.lock') }}
          restore-keys: |
            ${{ runner.os }}-${{ env.CACHE_VERSION }}-node-

      - name: Install JS dependencies
        run: bun install --frozen-lockfile

      # Biggest single win: the iroh/gossip/docs crate graph is large. The
      # eas-build-pre-install hook compiles into modules/iroh-location/rust/target,
      # so a warm cache skips recompiling unchanged crates. rust-cache also caches
      # ~/.cargo/{registry,git} and saves automatically in a post-job step.
      - name: Cache Rust (cargo + iroh-location target)
        uses: Swatinem/rust-cache@v2
        with:
          workspaces: modules/iroh-location/rust -> target
          key: ${{ env.CACHE_VERSION }}-ios-aarch64
          cache-all-crates: true

      # Best-effort: ios/ is generated by prebuild during the build, so Podfile.lock
      # doesn't exist at restore time — key on the JS/native manifests as a proxy.
      - name: Cache CocoaPods
        uses: actions/cache@v4
        with:
          path: |
            ios/Pods
            ~/Library/Caches/CocoaPods
          key: ${{ runner.os }}-${{ env.CACHE_VERSION }}-pods-${{ hashFiles('bun.lock', 'app.json') }}
          restore-keys: |
            ${{ runner.os }}-${{ env.CACHE_VERSION }}-pods-

      - name: Write marketing version into app.json
        run: |
          node -e "const fs=require('fs');const p='app.json';const j=JSON.parse(fs.readFileSync(p,'utf8'));j.expo.version='${{ steps.semver.outputs.version }}';fs.writeFileSync(p, JSON.stringify(j,null,2)+'\n');"
          echo "app.json version -> ${{ steps.semver.outputs.version }}"

      - name: Set up EAS CLI
        uses: expo/expo-github-action@v8
        with:
          eas-version: latest
          token: ${{ secrets.EXPO_TOKEN }}

      # Runs prebuild -> eas-build-pre-install.sh (rustup + aarch64-apple-ios target,
      # compiles the crate, xcodebuild -create-xcframework) -> pod install -> xcodebuild.
      # Signing credentials are pulled from EAS via EXPO_TOKEN. buildNumber is
      # auto-incremented remotely (appVersionSource: remote + production.autoIncrement).
      - name: Build iOS (.ipa) locally
        run: |
          mkdir -p "$GITHUB_WORKSPACE/build"
          eas build \
            --platform ios \
            --profile production \
            --local \
            --non-interactive \
            --output "$GITHUB_WORKSPACE/build/streetcryptid.ipa"

      - name: Submit to App Store Connect
        run: |
          eas submit \
            --platform ios \
            --profile production \
            --path "$GITHUB_WORKSPACE/build/streetcryptid.ipa" \
            --non-interactive

      - name: Commit version bump + tag
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add app.json
          git commit -m "chore(release): v${{ steps.semver.outputs.version }} [skip ci]"
          git tag "v${{ steps.semver.outputs.version }}"
          git push origin HEAD:main
          git push origin "v${{ steps.semver.outputs.version }}"
