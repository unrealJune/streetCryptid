name: Submit iOS to TestFlight

on:
  workflow_dispatch:

permissions:
  contents: read

concurrency:
  group: submit-testflight
  cancel-in-progress: false

env:
  CI: '1'
  EXPO_NO_TELEMETRY: '1'
  EAS_CLI_VERSION: 21.0.3

jobs:
  submit_ios:
    name: Build and submit iOS
    if: github.ref == 'refs/heads/main'
    runs-on: ubuntu-latest
    timeout-minutes: 90
    environment: app-store-submissions
    steps:
      - name: Require Expo token
        env:
          EXPO_TOKEN: ${{ secrets.EXPO_TOKEN }}
        run: |
          if [[ -z "$EXPO_TOKEN" ]]; then
            echo "The app-store-submissions environment is missing EXPO_TOKEN." >&2
            exit 1
          fi

      - name: Check out main
        uses: actions/checkout@3d3c42e5aac5ba805825da76410c181273ba90b1 # v7.0.1
        with:
          persist-credentials: false

      - name: Install Bun
        uses: oven-sh/setup-bun@0c5077e51419868618aeaa5fe8019c62421857d6 # v2.2.0
        with:
          bun-version: 1.3.14

      - name: Install project dependencies
        run: bun install --frozen-lockfile

      - name: Install EAS CLI
        run: bun add --global "eas-cli@$EAS_CLI_VERSION"

      - name: Verify EAS log isolation
        run: bash scripts/test-eas-ci-log-isolation.sh

      - name: Build and submit to TestFlight
        env:
          EAS_PRIVATE_LOG: ${{ runner.temp }}/eas-cloud-submit.log
          EAS_BUILD_GIT_COMMIT_HASH: ${{ github.sha }}
          EXPO_TOKEN: ${{ secrets.EXPO_TOKEN }}
        run: bash scripts/eas-cloud-submit-ci.sh ios production

      - name: Remove private EAS logs
        if: always()
        env:
          EAS_PRIVATE_LOG: ${{ runner.temp }}/eas-cloud-submit.log
        run: |
          set -euo pipefail
          case "$EAS_PRIVATE_LOG" in
            "$RUNNER_TEMP"/*) rm -f -- "$EAS_PRIVATE_LOG" ;;
            *)
              echo "Refusing to clean unexpected path: $EAS_PRIVATE_LOG" >&2
              exit 1
              ;;
          esac
