name: PR standalone Release builds

on:
  pull_request:
    types:
      - opened
      - reopened
      - synchronize

permissions:
  contents: read

concurrency:
  group: pr-development-builds-${{ github.event.pull_request.number }}
  cancel-in-progress: true

env:
  CI: '1'
  EXPO_NO_TELEMETRY: '1'
  EAS_CLI_VERSION: 21.0.3

jobs:
  build_ios:
    name: Build and upload iOS Release
    if: >-
      ${{github.event.pull_request.head.repo.full_name == github.repository}}
    runs-on: macos-latest
    timeout-minutes: 90
    environment: development-builds
    permissions:
      contents: read
    outputs:
      install_url: ${{ steps.upload.outputs.url }}
    env:
      EAS_BUILD_GIT_COMMIT_HASH: ${{ github.event.pull_request.head.sha }}
      EAS_LOCAL_BUILD_SKIP_CLEANUP: '0'
      EXPO_NO_KEYCHAIN: '1'
    steps:
      - name: Require Expo token
        env:
          EXPO_TOKEN: ${{ secrets.EXPO_TOKEN }}
        run: |
          if [[ -z "$EXPO_TOKEN" ]]; then
            echo "The development-builds environment is missing EXPO_TOKEN." >&2
            exit 1
          fi

      - name: Configure isolated build paths
        env:
          PR_NUMBER: ${{ github.event.pull_request.number }}
        run: |
          {
            echo "BUILD_ARTIFACT=$RUNNER_TEMP/streetcryptid-pr-$PR_NUMBER.ipa"
            echo "EAS_LOCAL_BUILD_ARTIFACTS_DIR=$RUNNER_TEMP/eas-artifacts-ios"
            echo "EAS_LOCAL_BUILD_WORKINGDIR=$RUNNER_TEMP/eas-local-build-ios"
            echo "CARGO_TARGET_DIR=$GITHUB_WORKSPACE/modules/iroh-location/rust/target"
            echo "RUSTUP_TOOLCHAIN=stable"
          } >> "$GITHUB_ENV"

      - name: Check out PR revision
        uses: actions/checkout@3d3c42e5aac5ba805825da76410c181273ba90b1 # v7.0.1
        with:
          ref: ${{ github.event.pull_request.head.sha }}
          persist-credentials: false

      - name: Install Node.js
        uses: actions/setup-node@820762786026740c76f36085b0efc47a31fe5020 # v7.0.0
        with:
          node-version: 22.23.1

      - name: Install Bun
        uses: oven-sh/setup-bun@0c5077e51419868618aeaa5fe8019c62421857d6 # v2.2.0
        with:
          bun-version: 1.3.14

      - name: Restore JavaScript package caches
        uses: actions/cache@55cc8345863c7cc4c66a329aec7e433d2d1c52a9 # v6.1.0
        with:
          path: |
            ~/.bun/install/cache
            ~/.npm/_cacache
          key: eas-local-js-${{ runner.os }}-${{ runner.arch }}-${{ env.EAS_CLI_VERSION }}-${{ hashFiles('bun.lock') }}
          restore-keys: |
            eas-local-js-${{ runner.os }}-${{ runner.arch }}-${{ env.EAS_CLI_VERSION }}-

      - name: Install project dependencies
        run: bun install --frozen-lockfile

      - name: Select the SDK 57 Xcode toolchain
        run: sudo xcode-select --switch /Applications/Xcode_26.6.app/Contents/Developer

      - name: Install Rust toolchain
        run: rustup toolchain install stable --profile minimal --no-self-update

      - name: Restore Rust build cache
        uses: Swatinem/rust-cache@c19371144df3bb44fab255c43d04cbc2ab54d1c4 # v2.9.1
        with:
          workspaces: modules/iroh-location/rust -> target
          key: eas-local-${{ hashFiles('scripts/eas-build-pre-install.sh', 'scripts/generate-uniffi-bindings.sh', 'modules/iroh-location/rust/src/**/*.rs', 'modules/iroh-location/rust/third_party/**/*.rs') }}
          cache-workspace-crates: 'true'

      - name: Restore CocoaPods download cache
        uses: actions/cache@55cc8345863c7cc4c66a329aec7e433d2d1c52a9 # v6.1.0
        with:
          path: ~/Library/Caches/CocoaPods
          key: eas-local-cocoapods-${{ runner.os }}-${{ hashFiles('bun.lock', 'package.json', 'app.json', 'app.config.ts', 'modules/iroh-location/ios/IrohLocation.podspec') }}
          restore-keys: |
            eas-local-cocoapods-${{ runner.os }}-

      - name: Install EAS CLI
        run: bun add --global "eas-cli@$EAS_CLI_VERSION"

      - name: Verify EAS log isolation
        run: bash scripts/test-eas-ci-log-isolation.sh

      - name: Build locally and upload the IPA to EAS
        id: upload
        env:
          EXPO_TOKEN: ${{ secrets.EXPO_TOKEN }}
        run: |
          set -euo pipefail
          mkdir -p "$EAS_LOCAL_BUILD_ARTIFACTS_DIR" "$EAS_LOCAL_BUILD_WORKINGDIR"
          bash scripts/eas-local-build-ci.sh \
            ios \
            production-internal-ios \
            "$BUILD_ARTIFACT"

      - name: Remove local build state
        if: always()
        run: |
          set -euo pipefail
          for path in \
            "${EAS_LOCAL_BUILD_ARTIFACTS_DIR:-}" \
            "${EAS_LOCAL_BUILD_WORKINGDIR:-}"; do
            if [[ -z "$path" ]]; then
              continue
            fi
            if [[ "$path" != "$RUNNER_TEMP/"* ]]; then
              echo "Refusing to clean unexpected path: $path" >&2
              exit 1
            fi
            if [[ -d "$path" ]]; then
              find "$path" -depth -delete
            fi
          done
          if [[ -n "${BUILD_ARTIFACT:-}" ]]; then
            rm -f -- "$BUILD_ARTIFACT"
          fi

  build_android:
    name: Build and upload Android Release
    if: >-
      ${{github.event.pull_request.head.repo.full_name == github.repository}}
    runs-on: ubuntu-24.04
    timeout-minutes: 90
    environment: development-builds
    permissions:
      contents: read
    outputs:
      install_url: ${{ steps.upload.outputs.url }}
    env:
      EAS_BUILD_GIT_COMMIT_HASH: ${{ github.event.pull_request.head.sha }}
      EAS_LOCAL_BUILD_SKIP_CLEANUP: '0'
    steps:
      - name: Require Expo token
        env:
          EXPO_TOKEN: ${{ secrets.EXPO_TOKEN }}
        run: |
          if [[ -z "$EXPO_TOKEN" ]]; then
            echo "The development-builds environment is missing EXPO_TOKEN." >&2
            exit 1
          fi

      - name: Configure isolated build paths
        env:
          PR_NUMBER: ${{ github.event.pull_request.number }}
        run: |
          {
            echo "BUILD_ARTIFACT=$RUNNER_TEMP/streetcryptid-pr-$PR_NUMBER.apk"
            echo "EAS_LOCAL_BUILD_ARTIFACTS_DIR=$RUNNER_TEMP/eas-artifacts-android"
            echo "EAS_LOCAL_BUILD_WORKINGDIR=$RUNNER_TEMP/eas-local-build-android"
            echo "CARGO_TARGET_DIR=$GITHUB_WORKSPACE/modules/iroh-location/rust/target"
            echo "RUSTUP_TOOLCHAIN=stable"
          } >> "$GITHUB_ENV"

      - name: Check out PR revision
        uses: actions/checkout@3d3c42e5aac5ba805825da76410c181273ba90b1 # v7.0.1
        with:
          ref: ${{ github.event.pull_request.head.sha }}
          persist-credentials: false

      - name: Install Node.js
        uses: actions/setup-node@820762786026740c76f36085b0efc47a31fe5020 # v7.0.0
        with:
          node-version: 22.23.1

      - name: Install Bun
        uses: oven-sh/setup-bun@0c5077e51419868618aeaa5fe8019c62421857d6 # v2.2.0
        with:
          bun-version: 1.3.14

      - name: Restore JavaScript package caches
        uses: actions/cache@55cc8345863c7cc4c66a329aec7e433d2d1c52a9 # v6.1.0
        with:
          path: |
            ~/.bun/install/cache
            ~/.npm/_cacache
          key: eas-local-js-${{ runner.os }}-${{ runner.arch }}-${{ env.EAS_CLI_VERSION }}-${{ hashFiles('bun.lock') }}
          restore-keys: |
            eas-local-js-${{ runner.os }}-${{ runner.arch }}-${{ env.EAS_CLI_VERSION }}-

      - name: Install project dependencies
        run: bun install --frozen-lockfile

      - name: Install the SDK 57 Android NDK
        run: |
          set -euo pipefail
          "$ANDROID_HOME/cmdline-tools/latest/bin/sdkmanager" "ndk;27.1.12297006"
          ndk_home="$ANDROID_HOME/ndk/27.1.12297006"
          {
            echo "ANDROID_NDK=$ndk_home"
            echo "ANDROID_NDK_HOME=$ndk_home"
            echo "ANDROID_NDK_ROOT=$ndk_home"
          } >> "$GITHUB_ENV"

      - name: Install Rust toolchain
        run: rustup toolchain install stable --profile minimal --no-self-update

      - name: Restore Rust build cache
        uses: Swatinem/rust-cache@c19371144df3bb44fab255c43d04cbc2ab54d1c4 # v2.9.1
        with:
          workspaces: modules/iroh-location/rust -> target
          key: eas-local-${{ hashFiles('scripts/eas-build-pre-install.sh', 'scripts/generate-uniffi-bindings.sh', 'modules/iroh-location/rust/src/**/*.rs', 'modules/iroh-location/rust/third_party/**/*.rs') }}
          cache-workspace-crates: 'true'

      - name: Restore Gradle dependency cache
        uses: actions/cache@55cc8345863c7cc4c66a329aec7e433d2d1c52a9 # v6.1.0
        with:
          path: |
            ~/.gradle/caches/modules-2
            ~/.gradle/caches/jars-*
            ~/.gradle/caches/transforms-*
            ~/.gradle/wrapper
          key: eas-local-gradle-${{ runner.os }}-${{ hashFiles('bun.lock', 'package.json', 'app.json', 'app.config.ts', 'modules/iroh-location/android/build.gradle') }}
          restore-keys: |
            eas-local-gradle-${{ runner.os }}-

      - name: Install EAS CLI
        run: bun add --global "eas-cli@$EAS_CLI_VERSION"

      - name: Verify EAS log isolation
        run: bash scripts/test-eas-ci-log-isolation.sh

      - name: Build locally and upload the APK to EAS
        id: upload
        env:
          EXPO_TOKEN: ${{ secrets.EXPO_TOKEN }}
        run: |
          set -euo pipefail
          mkdir -p "$EAS_LOCAL_BUILD_ARTIFACTS_DIR" "$EAS_LOCAL_BUILD_WORKINGDIR"
          bash scripts/eas-local-build-ci.sh \
            android \
            production-internal-android \
            "$BUILD_ARTIFACT"

      - name: Remove local build state
        if: always()
        run: |
          set -euo pipefail
          for path in \
            "${EAS_LOCAL_BUILD_ARTIFACTS_DIR:-}" \
            "${EAS_LOCAL_BUILD_WORKINGDIR:-}"; do
            if [[ -z "$path" ]]; then
              continue
            fi
            if [[ "$path" != "$RUNNER_TEMP/"* ]]; then
              echo "Refusing to clean unexpected path: $path" >&2
              exit 1
            fi
            if [[ -d "$path" ]]; then
              find "$path" -depth -delete
            fi
          done
          if [[ -n "${BUILD_ARTIFACT:-}" ]]; then
            rm -f -- "$BUILD_ARTIFACT"
          fi

  comment:
    name: Post install links
    if: >-
      ${{
        always() &&
        github.event.pull_request.head.repo.full_name == github.repository &&
        (github.event.pull_request.user.login == 'Cobular' ||
          github.event.pull_request.user.login == 'ava-ankenbrandt' ||
          github.event.pull_request.user.login == 'unrealJune' ||
          (github.event.pull_request.user.login == 'copilot-swe-agent[bot]' &&
            startsWith(github.event.pull_request.head.ref, 'copilot/')))
      }}
    needs:
      - build_ios
      - build_android
    runs-on: ubuntu-24.04
    timeout-minutes: 5
    permissions:
      pull-requests: write
    env:
      GH_TOKEN: ${{ github.token }}
      IOS_RESULT: ${{ needs.build_ios.result }}
      IOS_URL: ${{ needs.build_ios.outputs.install_url }}
      ANDROID_RESULT: ${{ needs.build_android.result }}
      ANDROID_URL: ${{ needs.build_android.outputs.install_url }}
      PR_NUMBER: ${{ github.event.pull_request.number }}
      RUN_URL: ${{ github.server_url }}/${{ github.repository }}/actions/runs/${{ github.run_id }}
    steps:
      - name: Comment with EAS install pages
        run: |
          set -euo pipefail

          platform_line() {
            local platform="$1"
            local result="$2"
            local url="$3"
            if [[ "$result" == "success" && -n "$url" ]]; then
              printf -- '- **%s:** [Install from EAS (QR code)](%s)\n' "$platform" "$url"
            else
              printf -- '- **%s:** Build failed — [view GitHub Actions logs](%s)\n' "$platform" "$RUN_URL"
            fi
          }

          body="$(
            printf '🏗️ **PR standalone Release builds**\n\n'
            platform_line "iOS" "$IOS_RESULT" "$IOS_URL"
            platform_line "Android" "$ANDROID_RESULT" "$ANDROID_URL"
            printf '\nBuilt on ephemeral GitHub-hosted runners; EAS only hosts the finished app archives.'
          )"

          gh api \
            --method POST \
            "repos/$GITHUB_REPOSITORY/issues/$PR_NUMBER/comments" \
            --raw-field body="$body" \
            >/dev/null
